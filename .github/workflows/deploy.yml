name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd AMLAnalysisWorker
            git pull origin main
            docker stop analysis-worker
            docker rm analysis-worker
            docker rmi analysis-img
            docker build -t analysis-img .
            docker run -d --name analysis-worker analysis-img
