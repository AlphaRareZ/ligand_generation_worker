name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd ligand_generation_worker
            git pull origin main
            docker stop ligand-generation-worker
            docker rm ligand-generation-worker
            docker rmi ligand-generation-img
            docker build -t ligand-generation-img .
            docker run -d --name ligand-generation-worker ligand-generation-img
